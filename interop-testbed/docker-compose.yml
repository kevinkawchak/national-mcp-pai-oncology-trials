      SITE_ID: site-b
      PATIENT_COUNT: "15"
    networks: [trialmcp-national]

  site-b-mock-pacs:
    build:
      context: .
      dockerfile: mock_services/Dockerfile.pacs
    container_name: site-b-mock-pacs
    environment:
      SITE_ID: site-b
      STUDY_COUNT: "10"
    networks: [trialmcp-national]

  # ──────────────────────────────────────────────────────────────────────────
  # Sponsor — Authorization + Audit + Provenance
  # ──────────────────────────────────────────────────────────────────────────
  sponsor-authz:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.authz
    container_name: sponsor-authz
    environment:
      TRIALMCP_SERVER_NAME: sponsor-authz
      TRIALMCP_STORAGE_BACKEND: sqlite
      TRIALMCP_STORAGE_DSN: /data/authz.db
      TRIALMCP_LOG_LEVEL: INFO
    networks: [trialmcp-national]
    volumes: [sponsor-data:/data]

  sponsor-ledger:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.ledger
    container_name: sponsor-ledger
    environment:
      TRIALMCP_SERVER_NAME: sponsor-ledger
      TRIALMCP_STORAGE_BACKEND: sqlite
      TRIALMCP_STORAGE_DSN: /data/ledger.db
      TRIALMCP_LOG_LEVEL: INFO
