    container_name: cro-fhir
    environment:
      TRIALMCP_SERVER_NAME: cro-fhir
      TRIALMCP_STORAGE_BACKEND: sqlite
      TRIALMCP_STORAGE_DSN: /data/fhir.db
      TRIALMCP_LOG_LEVEL: INFO
    networks: [trialmcp-national]
    volumes: [cro-data:/data]

  cro-ledger:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.ledger
    container_name: cro-ledger
    environment:
      TRIALMCP_SERVER_NAME: cro-ledger
      TRIALMCP_STORAGE_BACKEND: sqlite
      TRIALMCP_STORAGE_DSN: /data/ledger.db
      TRIALMCP_LOG_LEVEL: INFO
    networks: [trialmcp-national]
    volumes: [cro-data:/data]

  # ──────────────────────────────────────────────────────────────────────────
  # Mock Identity Provider (shared)
  # ──────────────────────────────────────────────────────────────────────────
  mock-identity:
    build:
      context: .
      dockerfile: mock_services/Dockerfile.identity
    container_name: mock-identity
    environment:
      ISSUER: "https://identity.trialmcp.example.com"
    networks: [trialmcp-national]

volumes:
  site-a-data:
  site-b-data:
  sponsor-data:
  cro-data:
