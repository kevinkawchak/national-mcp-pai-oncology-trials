      TRIALMCP_SERVER_NAME: site-b-fhir
      TRIALMCP_STORAGE_BACKEND: sqlite
      TRIALMCP_STORAGE_DSN: /data/fhir.db
      TRIALMCP_LOG_LEVEL: INFO
    networks: [trialmcp-national]
    volumes: [site-b-data:/data]

