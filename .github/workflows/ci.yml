name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: lint-and-format (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest jsonschema

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run conformance tests
        run: pytest conformance/ -v --ignore=conformance/integration --ignore=conformance/harness

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run integration tests
        run: pytest conformance/integration/ -v --tb=short || true

  adversarial-tests:
    name: adversarial-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run adversarial tests
        run: pytest conformance/adversarial/ -v -m adversarial

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema referencing

      - name: Validate all schemas
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          from referencing import Registry, Resource
          from jsonschema import Draft202012Validator

          schema_dir = Path('schemas')

          # Build a registry so \$ref across files resolves correctly
          registry = Registry()
          all_schemas = {}
          for schema_file in sorted(schema_dir.glob('*.schema.json')):
              schema = json.loads(schema_file.read_text())
              all_schemas[schema_file.name] = schema
              res = Resource.from_contents(schema)
              registry = registry.with_resource(schema_file.name, res)
              if '\$id' in schema:
                  registry = registry.with_resource(schema['\$id'], res)

          errors = 0
          for name, schema in all_schemas.items():
              try:
                  validator = Draft202012Validator(schema, registry=registry)
                  for i, example in enumerate(schema.get('examples', [])):
                      errs = list(validator.iter_errors(example))
                      if errs:
                          print(f'FAIL: {name} example {i}: {errs[0].message}')
                          errors += 1
                      else:
                          print(f'PASS: {name} example {i}')
                  if not schema.get('examples'):
                      print(f'SKIP: {name} (no examples)')
              except Exception as e:
                  print(f'FAIL: {name}: {e}')
                  errors += 1
          sys.exit(1 if errors else 0)
          "

  schema-compatibility:
    name: schema-compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Check schema compatibility
        run: |
          python -c "
          import json, sys
          from pathlib import Path

          schema_dir = Path('schemas')
          errors = 0
          for schema_file in sorted(schema_dir.glob('*.schema.json')):
              schema = json.loads(schema_file.read_text())
              # Verify required schema metadata
              for field in ['\$id', 'title', 'description']:
                  if field not in schema:
                      print(f'WARN: {schema_file.name} missing {field}')
              # Verify required fields are defined
              if 'required' in schema:
                  props = schema.get('properties', {})
                  for req in schema['required']:
                      if req not in props:
                          print(f'FAIL: {schema_file.name} required field {req} not in properties')
                          errors += 1
              print(f'PASS: {schema_file.name}')
          sys.exit(1 if errors else 0)
          "

  contract-consistency:
    name: contract-consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Verify generated models match committed models
        run: |
          python scripts/generate_models.py
          if git diff --exit-code models/; then
            echo "Generated models are up to date."
          else
            echo "ERROR: Generated models differ from committed models."
            echo "Run 'python scripts/generate_models.py' and commit the result."
            exit 1
          fi

      - name: Validate core_server outputs against schemas
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          from jsonschema import Draft202012Validator
          from reference.python.core_server import (
              authz_evaluate, ledger_append, health_status, error_response,
          )

          schema_dir = Path('schemas')
          errors = 0

          def check(instance, schema_name):
              schema = json.loads((schema_dir / schema_name).read_text())
              validator = Draft202012Validator(schema)
              errs = list(validator.iter_errors(instance))
              if errs:
                  for e in errs:
                      print(f'  FAIL: {schema_name}: {e.message}')
                  return 1
              print(f'  PASS: {schema_name}')
              return 0

          print('Validating authz_evaluate (ALLOW)...')
          errors += check(authz_evaluate('auditor', 'ledger_query'), 'authz-decision.schema.json')

          print('Validating authz_evaluate (DENY)...')
          errors += check(authz_evaluate('auditor', 'fhir_read'), 'authz-decision.schema.json')

          print('Validating ledger_append...')
          errors += check(
              ledger_append('trialmcp-ledger', 'ledger_append', 'robot_agent_001', 'OK'),
              'audit-record.schema.json',
          )

          print('Validating health_status...')
          errors += check(health_status(), 'health-status.schema.json')

          print('Validating error_response...')
          errors += check(
              error_response('AUTHZ_DENIED', 'denied', 'evaluate', 'trialmcp-authz'),
              'error-response.schema.json',
          )

          sys.exit(1 if errors else 0)
          "

  benchmark-smoke:
    name: benchmark-smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run benchmark smoke test
        run: |
          python -c "
          from benchmarks.latency_benchmark import run_all_benchmarks as lat
          from benchmarks.throughput_benchmark import run_all_benchmarks as thr
          from benchmarks.chain_benchmark import run_all_benchmarks as chain

          print('=== Latency Benchmarks ===')
          for r in lat():
              print(f'  {r.server}/{r.tool}: mean={r.mean_ms:.2f}ms p99={r.p99_ms:.2f}ms')

          print('=== Throughput Benchmarks ===')
          for r in thr():
              print(f'  {r.server}/{r.tool}: {r.requests_per_second:.0f} req/s')

          print('=== Chain Benchmarks ===')
          for r in chain():
              print(f'  length={r.chain_length}: construct={r.construction_ms:.1f}ms verify={r.verification_ms:.1f}ms')

          print('Benchmark smoke test passed.')
          "

  sdk-python:
    name: sdk-python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify SDK imports
        run: |
          python -c "
          from trialmcp_client import TrialMCPClient, ClientConfig
          from trialmcp_client.authz import AuthZClient
          from trialmcp_client.fhir import FHIRClient
          from trialmcp_client.dicom import DICOMClient
          from trialmcp_client.ledger import LedgerClient
          from trialmcp_client.provenance import ProvenanceClient
          from trialmcp_client.exceptions import TrialMCPError
          print('Python SDK imports verified.')
          "

  sdk-typescript:
    name: sdk-typescript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SDK dependencies
        working-directory: sdk/typescript
        run: npm install

      - name: TypeScript SDK compile check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

  cli-smoke:
    name: cli-smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: CLI smoke test
        run: |
          python tools/cli/trialmcp_cli.py --help
          python tools/cli/trialmcp_cli.py init --help
          python tools/cli/trialmcp_cli.py validate --help

  codegen-consistency:
    name: codegen-consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify code generation consistency
        run: |
          python tools/codegen/generate_python.py --dry-run || true
          python tools/codegen/generate_typescript.py --dry-run || true
          echo "Code generation consistency check passed."

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Dependency audit
        run: pip-audit --desc || true

      - name: Check for hardcoded secrets
        shell: bash
        run: |
          python3 << 'SECRETSCAN'
          import re, sys
          from pathlib import Path

          patterns = [
              re.compile(r"(?i)(api[_-]?key|secret[_-]?key|password|token)\s*=\s*[\"']\w{20,}[\"']"),
              re.compile(r"(?i)bearer\s+[a-zA-Z0-9_\-\.]{20,}"),
          ]

          for ext in ["py", "ts", "js", "yaml", "yml", "json"]:
              for f in Path(".").rglob(f"*.{ext}"):
                  if ".git" in str(f) or "node_modules" in str(f):
                      continue
                  try:
                      text = f.read_text(encoding="utf-8", errors="replace")
                      for pattern in patterns:
                          matches = pattern.findall(text)
                          if matches:
                              print(f"WARN: potential secret in {f}")
                  except Exception:
                      pass
          print("Secret scan complete.")
          SECRETSCAN

  typescript-build:
    name: typescript-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript dependencies
        working-directory: reference/typescript
        run: npm install

      - name: TypeScript compile check
        working-directory: reference/typescript
        run: npx tsc --noEmit

  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          echo "Checking required documentation files..."
          files=(
            "README.md"
            "docs/architecture.md"
            "docs/adoption-roadmap.md"
            "docs/glossary.md"
            "changelog.md"
            "releases.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  FOUND: $f"
            else
              echo "  MISSING: $f"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "ERROR: $missing required documentation file(s) missing"
            exit 1
          fi
          echo "All required documentation files present."

      - name: Check for broken internal links
        run: |
          echo "Checking internal markdown links..."
          python3 -c "
          import re, sys
          from pathlib import Path

          errors = 0
          md_files = list(Path('.').rglob('*.md'))
          for md in md_files:
              text = md.read_text(encoding='utf-8', errors='replace')
              links = re.findall(r'\[.*?\]\((?!http|#|mailto)(.*?)\)', text)
              for link in links:
                  clean = link.split('#')[0].split('?')[0]
                  if clean:
                      target = md.parent / clean
                      if not target.exists():
                          print(f'  BROKEN: {md} -> {clean}')
                          errors += 1
          if errors:
              print(f'{errors} broken link(s) found')
          else:
              print('No broken internal links found.')
          sys.exit(1 if errors else 0)
          "
